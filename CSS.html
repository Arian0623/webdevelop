<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - Join Us Today</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
    * {
        font-family: 'Inter', sans-serif;
    }
    
    body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 100%);
        background-size: 400% 400%;
        animation: gradientShift 15s ease infinite;
        min-height: 100vh;
    }

    @keyframes gradientShift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .glass-card {
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
    }

    .input-group {
        position: relative;
    }

    .input-icon {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        color: rgba(255, 255, 255, 0.6);
        transition: all 0.3s ease;
        pointer-events: none;
        z-index: 1;
    }

    .form-input {
        width: 100%;
        padding: 14px 16px 14px 48px;
        background: rgba(255, 255, 255, 0.08);
        border: 1.5px solid rgba(255, 255, 255, 0.2);
        border-radius: 12px;
        color: white;
        font-size: 15px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        outline: none;
    }

    .form-input::placeholder {
        color: rgba(255, 255, 255, 0.5);
    }

    .form-input:focus {
        background: rgba(255, 255, 255, 0.15);
        border-color: rgba(255, 255, 255, 0.5);
        box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.1);
        transform: translateY(-1px);
    }

    .form-input:focus + .input-icon {
        color: rgba(255, 255, 255, 1);
    }

    .form-input:valid:not(:placeholder-shown) {
        border-color: rgba(34, 197, 94, 0.6);
    }

    .form-input:invalid:not(:placeholder-shown):not(:focus) {
        border-color: rgba(239, 68, 68, 0.6);
    }

    .password-group .form-input {
        padding-right: 48px;
    }

    .validation-msg {
        display: none;
        font-size: 12px;
        color: rgba(252, 165, 165, 1);
        margin-top: 6px;
        margin-left: 4px;
        animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
        from {
            opacity: 0;
            transform: translateY(-6px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .form-input:invalid:not(:placeholder-shown):not(:focus) ~ .validation-msg {
        display: block;
    }

    .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
    }

    .btn-primary::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
        transition: left 0.5s ease;
    }

    .btn-primary:hover::before {
        left: 100%;
    }

    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:active {
        transform: translateY(0);
    }

    .btn-social {
        background: rgba(255, 255, 255, 0.08);
        border: 1.5px solid rgba(255, 255, 255, 0.2);
        transition: all 0.3s ease;
    }

    .btn-social:hover {
        background: rgba(255, 255, 255, 0.15);
        border-color: rgba(255, 255, 255, 0.4);
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }

    .checkbox-wrapper input[type="checkbox"] {
        appearance: none;
        width: 20px;
        height: 20px;
        border: 1.5px solid rgba(255, 255, 255, 0.4);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.08);
        cursor: pointer;
        position: relative;
        transition: all 0.3s ease;
        flex-shrink: 0;
    }

    .checkbox-wrapper input[type="checkbox"]:checked {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-color: transparent;
    }

    .checkbox-wrapper input[type="checkbox"]:checked::after {
        content: '\f00c';
        font-family: 'Font Awesome 6 Free';
        font-weight: 900;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        font-size: 12px;
        animation: checkPop 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    @keyframes checkPop {
        0% { transform: translate(-50%, -50%) scale(0); }
        50% { transform: translate(-50%, -50%) scale(1.2); }
        100% { transform: translate(-50%, -50%) scale(1); }
    }

    .checkbox-wrapper input[type="checkbox"]:focus {
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
        outline: none;
    }

    .divider {
        display: flex;
        align-items: center;
        text-align: center;
        color: rgba(255, 255, 255, 0.6);
        font-size: 13px;
    }

    .divider::before,
    .divider::after {
        content: '';
        flex: 1;
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }

    .divider::before {
        margin-right: 16px;
    }

    .divider::after {
        margin-left: 16px;
    }

    .floating-shape {
        position: absolute;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.08);
        animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-20px) rotate(180deg); }
    }

    .shape-1 {
        width: 80px;
        height: 80px;
        top: 10%;
        left: 10%;
        animation-delay: 0s;
    }

    .shape-2 {
        width: 60px;
        height: 60px;
        top: 70%;
        right: 10%;
        animation-delay: 2s;
    }

    .shape-3 {
        width: 100px;
        height: 100px;
        bottom: 10%;
        left: 15%;
        animation-delay: 4s;
    }

    @media (max-width: 640px) {
        .glass-card {
            margin: 16px;
            padding: 24px !important;
        }
        
        .form-input {
            font-size: 16px;
        }
    }
</style>
</head>
<body class="flex items-center justify-center p-4 relative overflow-x-hidden">
    <!-- Floating background shapes -->
    <div class="floating-shape shape-1"></div>
    <div class="floating-shape shape-2"></div>
    <div class="floating-shape shape-3"></div>

    <div class="w-full max-w-md relative z-10">
        <!-- Glass Card -->
        <div class="glass-card rounded-3xl p-8 sm:p-10">
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-white bg-opacity-10 mb-4">
                    <i class="fas fa-user-plus text-2xl text-white"></i>
                </div>
                <h1 class="text-3xl sm:text-4xl font-bold text-white mb-2">Create Account</h1>
                <p class="text-white text-opacity-70 text-sm sm:text-base">Join us today and start your journey</p>
            </div>

            <!-- Social Sign Up -->
            <div class="grid grid-cols-2 gap-3 mb-6">
                <button type="button" class="btn-social flex items-center justify-center gap-2 py-3 px-4 rounded-xl text-white text-sm font-medium">
                    <i class="fab fa-google text-lg"></i>
                    <span class="hidden sm:inline">Google</span>
                </button>
                <button type="button" class="btn-social flex items-center justify-center gap-2 py-3 px-4 rounded-xl text-white text-sm font-medium">
                    <i class="fab fa-github text-lg"></i>
                    <span class="hidden sm:inline">GitHub</span>
                </button>
            </div>

            <!-- Divider -->
            <div class="divider mb-6">
                <span>or sign up with email</span>
            </div>

            <!-- Form -->
            <form action="#" method="POST" novalidate class="space-y-5">
                <!-- Full Name -->
                <div class="input-group">
                    <input 
                        type="text" 
                        id="fullname" 
                        name="fullname" 
                        required 
                        minlength="2"
                        class="form-input" 
                        placeholder="Full Name"
                        autocomplete="name"
                    >
                    <i class="fas fa-user input-icon"></i>
                    <span class="validation-msg">Please enter at least 2 characters</span>
                </div>

                <!-- Email -->
                <div class="input-group">
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        required 
                        class="form-input" 
                        placeholder="Email Address"
                        autocomplete="email"
                    >
                    <i class="fas fa-envelope input-icon"></i>
                    <span class="validation-msg">Please enter a valid email address</span>
                </div>

                <!-- Password -->
                <div class="input-group password-group">
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        required 
                        minlength="8"
                        class="form-input" 
                        placeholder="Password"
                        autocomplete="new-password"
                    >
                    <i class="fas fa-lock input-icon"></i>
                    <span class="validation-msg">Password must be at least 8 characters</span>
                </div>

                <!-- Confirm Password -->
                <div class="input-group password-group">
                    <input 
                        type="password" 
                        id="confirm-password" 
                        name="confirm-password" 
                        required 
                        minlength="8"
                        class="form-input" 
                        placeholder="Confirm Password"
                        autocomplete="new-password"
                    >
                    <i class="fas fa-lock input-icon"></i>
                    <span class="validation-msg">Passwords must match</span>
                </div>

                <!-- Terms Checkbox -->
                <div class="checkbox-wrapper flex items-start gap-3 pt-1">
                    <input type="checkbox" id="terms" name="terms" required>
                    <label for="terms" class="text-sm text-white text-opacity-80 leading-relaxed cursor-pointer">
                        I agree to the <a href="#" class="text-white font-semibold hover:underline">Terms of Service</a> and <a href="#" class="text-white font-semibold hover:underline">Privacy Policy</a>
                    </label>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-primary w-full py-4 px-6 rounded-xl text-white font-semibold text-base sm:text-lg shadow-lg mt-6">
                    Sign Up
                </button>
            </form>

            <!-- Sign In Link -->
            <p class="text-center mt-8 text-white text-opacity-70 text-sm">
                Already have an account? 
                <a href="#" class="text-white font-semibold hover:underline transition-all">Sign In</a>
            </p>
        </div>

        <!-- Footer -->
        <p class="text-center mt-6 text-white text-opacity-50 text-xs">
            © 2024 Your Company. All rights reserved.
        </p>
    </div>
<script>(function(){document.addEventListener("click",function(e){var a=e.target.closest("[data-product-id]");if(!a)return;e.preventDefault();var pid=a.getAttribute("data-product-id");if(pid)parent.postMessage({type:"ecto-artifact-link-click",productId:pid},"*")})})();</script>
</body>
</html>
